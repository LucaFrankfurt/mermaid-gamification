server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available
    gzip_static on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache versioned JS/CSS assets aggressively (Vite fingerprints filenames)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static media
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        expires 6M;
        add_header Cache-Control "public";
    }

    # SPA fallback — all unmatched routes serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
