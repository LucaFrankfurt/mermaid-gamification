name: Dojo Guardian CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify-dojo:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter / Code Style Check
        run: npm run lint --if-present

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Dependency Vulnerability Audit
        run: npm audit --audit-level=high

      - name: Execute Vitest Suite (Levels 1-5 Check)
        run: npm run test

      - name: Collect Code Coverage
        run: npm run test -- --coverage --coverage.thresholds.lines=80 --coverage.thresholds.functions=80 --coverage.thresholds.branches=80

      - name: Validate i18n Translation Parity
        run: npx tsx scripts/check-i18n.ts

      - name: Verify Production Build Compilation
        run: npm run build
